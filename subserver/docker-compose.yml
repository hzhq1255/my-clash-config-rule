version: "3.8"

services:
  sub-server:
    image: ghcr.io/hzhq1255/my-clash-config-rule/subserver:0.0.2
    container_name: sub-server
    restart: always

    environment:
      # Server configuration
      - SERVER_PORT=5000
      - LOG_LEVEL=info

      # Subscription service credentials (REQUIRED)
      - ZCSSR_USER_EMAIL=${ZCSSR_USER_EMAIL}
      - ZCSSR_USER_PASSWD=${ZCSSR_USER_PASSWD}
      - ZCSSR_DOMAIN=${ZCSSR_DOMAIN}

      # Optional subscription settings
      - ZCSSR_SUB_USE_DOMAIN=false
      # - EXTEND_SUB_NODES=

      # GitHub proxy (for raw.githubusercontent.com access)
      - GHPROXY_DOMAIN=ghp.ci

      # Subconverter settings
      - SUBCONVERTER_VERSION=v0.9.2
      # For custom builds such as Surfboard Hysteria2 support, prefer an explicit binary URL.
      # - SUBCONVERTER_DOWNLOAD_URL=https://github.com/<owner>/subconverter/releases/download/<tag>/subconverter_linux64.tar.gz

    expose:
      - "5000"

    volumes:
      # Persist subconverter binary and cache
      - sub_data:/app/subconverter
      - sub_cache:/app/subconverter/subconverter/caches

    labels:
      - "com.centurylinklabs.watchtower.enable=true"

volumes:
  sub_data:
  sub_cache:
